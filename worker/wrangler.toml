name = "flatmate-portal-worker"
main = "index.js"
compatibility_date = "2024-01-01"

# ── D1 Database Binding ──────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "flatmate-portal-db"
database_id = "cd9970e5-ebe6-4ebc-8cb0-8b3233e5ef15"

# ── Environment Variables (Secrets — set via `wrangler secret put`) ──
# VAPID_PUBLIC_KEY   — base64url-encoded 65-byte uncompressed public key
# VAPID_PRIVATE_KEY  — base64url-encoded 32-byte private key scalar
# VAPID_SUBJECT      — e.g. "mailto:you@example.com"

# ── Cron Trigger (Trash Reminder) ────────────────────────────
[triggers]
crons = ["0 8 * * *", "0 16 * * *", "0 20 * * *"]   # 9 AM, 5 PM, 9 PM Rome (CET / UTC+1)
